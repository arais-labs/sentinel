services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arai_stack}
      POSTGRES_USER: ${POSTGRES_USER:-arai_stack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arai_stack}
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arai_stack} -d ${POSTGRES_DB:-arai_stack}"]
      interval: 5s
      timeout: 3s
      retries: 20

  araios-backend:
    build:
      context: .
      dockerfile: infra/docker/araios-backend.dev.Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-arai_stack}:${POSTGRES_PASSWORD:-arai_stack}@postgres:5432/${POSTGRES_DB:-arai_stack}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-3600}
      REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-604800}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
    volumes:
      - ./apps/backend/araios:/app
    depends_on:
      postgres:
        condition: service_healthy

  sentinel-backend:
    build:
      context: .
      dockerfile: infra/docker/sentinel-backend.dev.Dockerfile
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-arai_stack}:${POSTGRES_PASSWORD:-arai_stack}@postgres:5432/${POSTGRES_DB:-arai_stack}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-3600}
      REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-604800}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      ARAIOS_URL: http://araios-backend:9000
      SSRF_ALLOW_HOSTS: araios-backend
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      BROWSER_LIVE_VIEW_ENABLED: "true"
      BROWSER_LIVE_RESOLUTION: "1920x1080x24"
      BROWSER_VIEWPORT_WIDTH: "1920"
      BROWSER_VIEWPORT_HEIGHT: "1080"
      BROWSER_WINDOW_WIDTH: "1920"
      BROWSER_WINDOW_HEIGHT: "1080"
      BROWSER_DEVICE_SCALE_FACTOR: "1"
      BROWSER_PREWARM_ON_START: "true"
      BROWSER_USER_DATA_DIR: /data/browser-profile
      UVICORN_RELOAD: "true"
    command: bash ./scripts/start-backend.sh
    ports:
      - "${SENTINEL_API_PORT:-8000}:8000"
    volumes:
      - ./apps/backend/sentinel:/app
      - sentinel-browser-profile-dev:/data/browser-profile
    depends_on:
      postgres:
        condition: service_healthy
      araios-backend:
        condition: service_started

  araios-frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && APP_SENTINEL_URL=${APP_SENTINEL_URL:-/sentinel/} APP_ARAIOS_URL=${APP_ARAIOS_URL:-/araios/} VITE_BASE_PATH=/araios/ npm run dev -- --host --port 5174"
    volumes:
      - ./apps/frontend/araios:/app
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5174/araios/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 40
    depends_on:
      araios-backend:
        condition: service_started

  sentinel-frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "if [ ! -d node_modules ]; then npm ci; fi && APP_SENTINEL_URL=${APP_SENTINEL_URL:-/sentinel/} APP_ARAIOS_URL=${APP_ARAIOS_URL:-/araios/} VITE_BASE_PATH=/sentinel/ VITE_ROUTER_BASENAME=/sentinel VITE_SENTINEL_API_BASE_URL=/sentinel/api/v1 npm run dev -- --host --port 5173"
    volumes:
      - ./apps/frontend/sentinel:/app
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5173/sentinel/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 40
    depends_on:
      sentinel-backend:
        condition: service_started

  gateway:
    build:
      context: .
      dockerfile: infra/docker/gateway.dev.Dockerfile
    image: arai-stack-gateway-dev
    ports:
      - "${STACK_PORT:-4747}:80"
    depends_on:
      araios-backend:
        condition: service_started
      sentinel-backend:
        condition: service_started
      araios-frontend:
        condition: service_healthy
      sentinel-frontend:
        condition: service_healthy

volumes:
  pgdata_dev:
  sentinel-browser-profile-dev:

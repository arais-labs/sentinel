name: sentinel

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: sentinel_manager
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_manager"]
      interval: 5s
      timeout: 3s
      retries: 20

  sentinel-backend:
    build:
      context: .
      dockerfile: infra/docker/sentinel-backend.dev.Dockerfile
    environment:
      APP_ENV: development
      DATABASE_HOST: ${SENTINEL_DATABASE_HOST:-postgres}
      DATABASE_PORT: ${SENTINEL_DATABASE_PORT:-5432}
      DATABASE_USER: ${SENTINEL_DATABASE_USER:-sentinel}
      DATABASE_PASSWORD: ${SENTINEL_DATABASE_PASSWORD:-sentinel}
      DATABASE_MAINTENANCE_NAME: ${SENTINEL_DATABASE_MAINTENANCE_NAME:-postgres}
      DATABASE_MANAGER_NAME: ${SENTINEL_DATABASE_MANAGER_NAME:-sentinel_manager}
      JWT_SECRET_KEY: ${SENTINEL_JWT_SECRET_KEY:?Set SENTINEL_JWT_SECRET_KEY in .env to a long random value}
      DATA_ENCRYPTION_KEY: ${SENTINEL_DATA_ENCRYPTION_KEY:?Set SENTINEL_DATA_ENCRYPTION_KEY in .env to a long random value}
      SENTINEL_AUTH_USERNAME: ${SENTINEL_AUTH_USERNAME:?Set SENTINEL_AUTH_USERNAME in .env or the shell}
      SENTINEL_AUTH_PASSWORD: ${SENTINEL_AUTH_PASSWORD:?Set SENTINEL_AUTH_PASSWORD in .env or the shell}
      UVICORN_RELOAD: "true"
    volumes:
      - ./apps/backend/sentinel:/app
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  sentinel-frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "if [ ! -d node_modules ]; then npm ci; fi && npm run dev -- --host --port 5173"
    environment:
      VITE_BASE_PATH: /
      VITE_ROUTER_BASENAME: /
      VITE_SENTINEL_API_BASE_URL: /api/v1
      VITE_SESSION_DEBUG_PANEL: "false"
    ports:
      - "${STACK_PORT:-4747}:5173"
    volumes:
      # TODO: split hot-reloaded source from container-owned node_modules so
      # local macOS installs cannot shadow Linux-native optional dependencies.
      - ./apps/frontend/sentinel:/app
    depends_on:
      sentinel-backend:
        condition: service_started

volumes:
  pgdata_dev:

networks:
  default:
    name: sentinel_default

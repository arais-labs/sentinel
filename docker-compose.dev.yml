name: sentinel

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: sentinel_manager
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_manager"]
      interval: 5s
      timeout: 3s
      retries: 20

  sentinel-runtime:
    build:
      context: .
      dockerfile: infra/runtime/docker/Dockerfile
    image: sentinel-runtime
    profiles:
      - build-only

  sentinel-backend:
    build:
      context: .
      dockerfile: infra/docker/sentinel-backend.dev.Dockerfile
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    environment:
      APP_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: sentinel
      DATABASE_PASSWORD: sentinel
      DATABASE_MAINTENANCE_NAME: postgres
      DATABASE_MANAGER_NAME: sentinel_manager
      JWT_SECRET_KEY: ${SENTINEL_JWT_SECRET_KEY:?Set SENTINEL_JWT_SECRET_KEY in .env to a long random value}
      SENTINEL_AUTH_USERNAME: ${SENTINEL_AUTH_USERNAME:?Set SENTINEL_AUTH_USERNAME in .env or the shell}
      SENTINEL_AUTH_PASSWORD: ${SENTINEL_AUTH_PASSWORD:?Set SENTINEL_AUTH_PASSWORD in .env or the shell}
      RUNTIME_EXEC_BACKEND: ${SENTINEL_RUNTIME_BACKEND:?Set SENTINEL_RUNTIME_BACKEND in .env or the shell}
      RUNTIME_DOCKER_NETWORK: sentinel_default
      RUNTIME_QEMU_IMAGE: ${SENTINEL_QEMU_ARTIFACTS_DIR:-/tmp/sentinel-qemu-output}/sentinel-runtime-base-arm64.qcow2
      RUNTIME_QEMU_SSH_KEY_PATH: ${SENTINEL_QEMU_ARTIFACTS_DIR:-/tmp/sentinel-qemu-output}/sentinel-runtime-base-arm64.id_ed25519
      RUNTIME_QEMU_BRIDGE_URL: ${SENTINEL_QEMU_BRIDGE_URL:-http://host.docker.internal:47481}
      RUNTIME_QEMU_BRIDGE_TOKEN: ${SENTINEL_QEMU_BRIDGE_TOKEN:-}
      RUNTIME_QEMU_RUN_ROOT: ${SENTINEL_QEMU_RUN_ROOT:-}
      SESSION_RUNTIME_BASE_DIR: /data/runtime/workspaces
      RUNTIME_WORKSPACES_HOST_DIR: ${SENTINEL_RUNTIME_WORKSPACES_DIR:?Run ./sentinel-cli.sh --dev or set SENTINEL_RUNTIME_WORKSPACES_DIR}
      UVICORN_RELOAD: "true"
    volumes:
      - ./apps/backend/sentinel:/app
      - sentinel-runtime-ssh-dev:/data/runtime/ssh
      - ${SENTINEL_RUNTIME_WORKSPACES_DIR:?Run ./sentinel-cli.sh --dev or set SENTINEL_RUNTIME_WORKSPACES_DIR}:/data/runtime/workspaces
      - ${SENTINEL_QEMU_ARTIFACTS_DIR:-/tmp/sentinel-qemu-output}:${SENTINEL_QEMU_ARTIFACTS_DIR:-/tmp/sentinel-qemu-output}:ro
      - ./infra/runtime/qemu/output:/data/runtime/qemu-output:ro
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  sentinel-frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "if [ ! -d node_modules ]; then npm ci; fi && npm run dev -- --host --port 5173"
    environment:
      VITE_BASE_PATH: /
      VITE_ROUTER_BASENAME: /
      VITE_SENTINEL_API_BASE_URL: /api/v1
      VITE_SESSION_DEBUG_PANEL: "false"
    ports:
      - "${STACK_PORT:-4747}:5173"
    volumes:
      # TODO: split hot-reloaded source from container-owned node_modules so
      # local macOS installs cannot shadow Linux-native optional dependencies.
      - ./apps/frontend/sentinel:/app
    depends_on:
      sentinel-backend:
        condition: service_started

volumes:
  pgdata_dev:
  sentinel-runtime-ssh-dev:

networks:
  default:
    name: sentinel_default

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentinel Desktop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <header class="app-header">
        <div class="header-left">
          <div class="brand-container">
            <img class="brand-mark-mini" src="../../assets/icon.png" alt="" />
          </div>
          <div class="header-title-block">
            <h1>Sentinel Desktop</h1>
            <p class="subtitle">Console Control Center</p>
          </div>
        </div>
        <div class="header-actions">
          <button id="resetAuthBtn" class="danger">Reset Auth</button>
          <button id="openBtn" class="primary">Open Sentinel</button>
        </div>
      </header>

      <main class="app-content">
        <div class="status-grid reveal delay-1">
          <section class="panel">
            <div class="panel-header">
              <div class="panel-title-block">
                <h2 class="panel-title">Services</h2>
                <p class="panel-subtitle">Desktop-owned processes and listening ports</p>
              </div>
              <span id="servicesOverall" class="pill">Unknown</span>
            </div>
            <div id="services" class="service-list"></div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <div class="panel-title-block">
                <h2 class="panel-title">Runtime</h2>
                <p class="panel-subtitle">QEMU provider and base image preparation</p>
              </div>
              <span id="runtimeOverall" class="pill">Unknown</span>
            </div>
            <div id="runtimeDetails" class="detail-list"></div>
          </section>
        </div>

        <section class="panel support-panel reveal delay-2">
          <div class="support-row">
            <div>
              <span class="detail-label">App Support</span>
              <span id="supportPath" class="mono">-</span>
            </div>
            <div class="support-actions">
              <button id="revealBtn">Reveal Folder</button>
              <button id="factoryResetBtn" class="danger">Factory Reset</button>
            </div>
          </div>
        </section>

        <section class="panel logs-panel reveal delay-3">
          <div class="panel-header">
            <div class="panel-title-block">
              <h2 class="panel-title">Audit Output</h2>
              <p class="panel-subtitle">Live Supervisor Stream</p>
            </div>
            <div class="panel-actions">
              <label class="select-control" for="logServiceFilter">
                <span>Service</span>
                <select id="logServiceFilter">
                  <option value="all">All</option>
                </select>
              </label>
              <button id="openLogFolderBtn">Open Log Folder</button>
            </div>
          </div>
          <pre id="logs"></pre>
        </section>
      </main>
    </div>

    <script type="module" src="../../dist/renderer/renderer.js"></script>
  </body>
</html>

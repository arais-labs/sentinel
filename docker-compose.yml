name: sentinel

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: sentinel_manager
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${SENTINEL_POSTGRES_PASSWORD:?Set SENTINEL_POSTGRES_PASSWORD before using docker-compose.yml}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_manager"]
      interval: 5s
      timeout: 3s
      retries: 20

  sentinel-runtime:
    build:
      context: .
      dockerfile: infra/runtime/docker/Dockerfile
    image: sentinel-runtime
    profiles:
      - build-only

  sentinel-backend:
    build:
      context: .
      dockerfile: infra/docker/sentinel-backend.prod.Dockerfile
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: sentinel
      DATABASE_PASSWORD: ${SENTINEL_POSTGRES_PASSWORD:?Set SENTINEL_POSTGRES_PASSWORD before using docker-compose.yml}
      DATABASE_MAINTENANCE_NAME: postgres
      DATABASE_MANAGER_NAME: sentinel_manager
      JWT_SECRET_KEY: ${SENTINEL_JWT_SECRET_KEY:?Set SENTINEL_JWT_SECRET_KEY to a long random value before using docker-compose.yml}
      SENTINEL_AUTH_USERNAME: ${SENTINEL_AUTH_USERNAME:?Set SENTINEL_AUTH_USERNAME before using docker-compose.yml}
      SENTINEL_AUTH_PASSWORD: ${SENTINEL_AUTH_PASSWORD:?Set SENTINEL_AUTH_PASSWORD before using docker-compose.yml}
      RUNTIME_EXEC_BACKEND: ${SENTINEL_RUNTIME_BACKEND:?Set SENTINEL_RUNTIME_BACKEND before using docker-compose.yml}
      RUNTIME_DOCKER_NETWORK: sentinel_default
      RUNTIME_QEMU_IMAGE: ${SENTINEL_QEMU_ARTIFACTS_DIR:-/tmp/sentinel-qemu-output}/sentinel-runtime-base-arm64.qcow2
      RUNTIME_QEMU_SSH_KEY_PATH: ${SENTINEL_QEMU_ARTIFACTS_DIR:-/tmp/sentinel-qemu-output}/sentinel-runtime-base-arm64.id_ed25519
      RUNTIME_QEMU_BRIDGE_URL: ${SENTINEL_QEMU_BRIDGE_URL:-http://host.docker.internal:47481}
      RUNTIME_QEMU_BRIDGE_TOKEN: ${SENTINEL_QEMU_BRIDGE_TOKEN:-}
      RUNTIME_QEMU_RUN_ROOT: ${SENTINEL_QEMU_RUN_ROOT:-}
      SESSION_RUNTIME_BASE_DIR: /data/runtime/workspaces
      RUNTIME_WORKSPACES_HOST_DIR: ${SENTINEL_RUNTIME_WORKSPACES_DIR:?Set SENTINEL_RUNTIME_WORKSPACES_DIR to an absolute host path before using docker-compose.yml}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - sentinel-runtime-ssh:/data/runtime/ssh
      - ${SENTINEL_RUNTIME_WORKSPACES_DIR:?Set SENTINEL_RUNTIME_WORKSPACES_DIR to an absolute host path before using docker-compose.yml}:/data/runtime/workspaces
      - ${SENTINEL_QEMU_ARTIFACTS_DIR:-/tmp/sentinel-qemu-output}:${SENTINEL_QEMU_ARTIFACTS_DIR:-/tmp/sentinel-qemu-output}:ro
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sentinel-frontend:
    build:
      context: .
      dockerfile: infra/docker/sentinel-frontend.prod.Dockerfile
      args:
        VITE_BASE_PATH: /
        VITE_ROUTER_BASENAME: /
        VITE_SENTINEL_API_BASE_URL: /api/v1
        VITE_SESSION_DEBUG_PANEL: "false"
    restart: unless-stopped
    ports:
      - "${STACK_PORT:-4747}:80"
    depends_on:
      sentinel-backend:
        condition: service_started

volumes:
  pgdata:
  sentinel-runtime-ssh:

networks:
  default:
    name: sentinel_default

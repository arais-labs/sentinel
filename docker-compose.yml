name: sentinel

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: sentinel_manager
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${SENTINEL_POSTGRES_PASSWORD:?Set SENTINEL_POSTGRES_PASSWORD before using docker-compose.yml}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_manager"]
      interval: 5s
      timeout: 3s
      retries: 20

  sentinel-backend:
    build:
      context: .
      dockerfile: infra/docker/sentinel-backend.prod.Dockerfile
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_HOST: ${SENTINEL_DATABASE_HOST:-postgres}
      DATABASE_PORT: ${SENTINEL_DATABASE_PORT:-5432}
      DATABASE_USER: ${SENTINEL_DATABASE_USER:-sentinel}
      DATABASE_PASSWORD: ${SENTINEL_DATABASE_PASSWORD:-${SENTINEL_POSTGRES_PASSWORD:?Set SENTINEL_POSTGRES_PASSWORD before using docker-compose.yml}}
      DATABASE_MAINTENANCE_NAME: ${SENTINEL_DATABASE_MAINTENANCE_NAME:-postgres}
      DATABASE_MANAGER_NAME: ${SENTINEL_DATABASE_MANAGER_NAME:-sentinel_manager}
      JWT_SECRET_KEY: ${SENTINEL_JWT_SECRET_KEY:?Set SENTINEL_JWT_SECRET_KEY to a long random value before using docker-compose.yml}
      DATA_ENCRYPTION_KEY: ${SENTINEL_DATA_ENCRYPTION_KEY:?Set SENTINEL_DATA_ENCRYPTION_KEY to a long random value before using docker-compose.yml}
      SENTINEL_AUTH_USERNAME: ${SENTINEL_AUTH_USERNAME:?Set SENTINEL_AUTH_USERNAME before using docker-compose.yml}
      SENTINEL_AUTH_PASSWORD: ${SENTINEL_AUTH_PASSWORD:?Set SENTINEL_AUTH_PASSWORD before using docker-compose.yml}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sentinel-frontend:
    build:
      context: .
      dockerfile: infra/docker/sentinel-frontend.prod.Dockerfile
      args:
        VITE_BASE_PATH: /
        VITE_ROUTER_BASENAME: /
        VITE_SENTINEL_API_BASE_URL: /api/v1
        VITE_SESSION_DEBUG_PANEL: "false"
    restart: unless-stopped
    ports:
      - "${STACK_PORT:-4747}:80"
    depends_on:
      sentinel-backend:
        condition: service_started

volumes:
  pgdata:

networks:
  default:
    name: sentinel_default

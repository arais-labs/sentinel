name: Desktop Release

# Every push to main publishes a stable build; every push to beta publishes a
# beta build. Any other branch can be released on demand via the Actions UI
# (pick the branch, choose a channel). Each run creates a NEW versioned release
# and updates the channel's `latest-<channel>` pointer the app polls.
on:
  push:
    branches: [main, beta]
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel to publish
        type: choice
        options: [beta, stable]
        default: beta

# Needed to create releases and upload assets.
permissions:
  contents: write

# Serialize per ref so two pushes don't race on the same pointer release.
concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build DMG + payload and publish
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install native build tools
        run: brew install ninja pkg-config

      - name: Resolve channel
        id: channel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            channel="${{ inputs.channel }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            channel="stable"
          else
            channel="beta"
          fi
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "Publishing channel: $channel"

      - name: Install desktop shell deps
        working-directory: apps/desktop/sentinel
        run: npm ci

      - name: Build DMG shell (python + git + gh + postgres)
        working-directory: apps/desktop/sentinel
        env:
          SENTINEL_BUILD_CHANNEL: ${{ steps.channel.outputs.channel }}
          # No signing certs on CI — produce an ad-hoc signed DMG.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run desktop:build

      - name: Build payload (frozen backend + frontend dist)
        working-directory: apps/desktop/sentinel
        env:
          SENTINEL_BUILD_CHANNEL: ${{ steps.channel.outputs.channel }}
        run: npm run payload:build

      - name: Publish to GitHub Releases
        working-directory: apps/desktop/sentinel
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/publish-release.mjs "${{ steps.channel.outputs.channel }}"

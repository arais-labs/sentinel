name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  compose-validate:
    name: Compose Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate production compose
        run: docker compose -f docker-compose.yml config
      - name: Validate dev compose
        run: docker compose -f docker-compose.dev.yml config

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend deps
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          python -m pip install --upgrade pip
          python -m pip install -e "apps/backend/sentinel[dev]"

      - name: Test backend
        env:
          JWT_SECRET_KEY: ci-test-secret-key-with-32-bytes-minimum
          DEV_TOKEN: sentinel-dev-token
          PYTHONPATH: .
        run: |
          cd apps/backend/sentinel
          python -m compileall app tests
          python -m pytest tests/test_auth_flow.py tests/test_validation.py tests/test_memory.py tests/test_tools.py tests/test_onboarding.py tests/test_playwright.py -q

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/frontend/sentinel/package-lock.json

      - name: Install dependencies
        working-directory: apps/frontend/sentinel
        run: npm ci

      - name: Build
        working-directory: apps/frontend/sentinel
        run: npm run build

name: CI

# Every push runs the test gate. Pushes to main/beta (and manual dispatch) also
# build and publish the desktop release, but only after the gate passes — a red
# CI never ships a DMG. main publishes stable; beta publishes beta.
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel to publish
        type: choice
        options: [beta, stable]
        default: beta

permissions:
  contents: read

jobs:
  compose-validate:
    name: Compose Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate production compose
        env:
          SENTINEL_POSTGRES_PASSWORD: ci-validate
          SENTINEL_JWT_SECRET_KEY: ci-validate
          SENTINEL_DATA_ENCRYPTION_KEY: ci-validate
          SENTINEL_AUTH_USERNAME: ci-admin
          SENTINEL_AUTH_PASSWORD: ci-validate
        run: docker compose -f docker-compose.yml config
      - name: Validate dev compose
        env:
          SENTINEL_JWT_SECRET_KEY: ci-validate
          SENTINEL_DATA_ENCRYPTION_KEY: ci-validate
          SENTINEL_AUTH_USERNAME: ci-admin
          SENTINEL_AUTH_PASSWORD: ci-validate
        run: docker compose -f docker-compose.dev.yml config

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: apps/backend/sentinel/uv.lock
          python-version: '3.12'

      - name: Install backend deps
        working-directory: apps/backend/sentinel
        run: uv sync --group dev

      - name: Test backend
        working-directory: apps/backend/sentinel
        run: |
          uv run python -m compileall app tests
          uv run pytest tests/ -q

  desktop-typecheck:
    name: Desktop Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/desktop/sentinel/package-lock.json

      - name: Install dependencies
        working-directory: apps/desktop/sentinel
        run: npm ci

      - name: Typecheck
        working-directory: apps/desktop/sentinel
        run: npx tsc -p tsconfig.json --noEmit

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/frontend/sentinel/package-lock.json

      - name: Install dependencies
        working-directory: apps/frontend/sentinel
        run: npm ci

      - name: Build
        working-directory: apps/frontend/sentinel
        run: npm run build

  desktop-release:
    name: Build DMG + payload and publish
    needs: [compose-validate, backend-tests, desktop-typecheck, frontend-build]
    # Only ship from main/beta pushes or a manual dispatch; PRs and feature
    # branches run the gate above but never publish.
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta'
    runs-on: macos-15
    permissions:
      contents: write
    # Serialize per ref so two pushes don't race on the same pointer release.
    concurrency:
      group: desktop-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install native build tools
        run: brew install ninja pkg-config

      - name: Resolve channel
        id: channel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            channel="${{ inputs.channel }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            channel="stable"
          else
            channel="beta"
          fi
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "Publishing channel: $channel"

      - name: Install desktop shell deps
        working-directory: apps/desktop/sentinel
        run: npm ci

      - name: Build DMG shell (python + git + gh + postgres)
        working-directory: apps/desktop/sentinel
        env:
          SENTINEL_BUILD_CHANNEL: ${{ steps.channel.outputs.channel }}
          # No signing certs on CI — produce an ad-hoc signed DMG.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run desktop:build

      - name: Build payload (frozen backend + frontend dist)
        working-directory: apps/desktop/sentinel
        env:
          SENTINEL_BUILD_CHANNEL: ${{ steps.channel.outputs.channel }}
        run: npm run payload:build

      - name: Publish to GitHub Releases
        working-directory: apps/desktop/sentinel
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/publish-release.mjs "${{ steps.channel.outputs.channel }}"

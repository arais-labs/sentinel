name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  compose-validate:
    name: Compose Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate production compose
        run: docker compose -f docker-compose.yml config
      - name: Validate dev compose
        run: docker compose -f docker-compose.dev.yml config

  backend-tests:
    name: Backend Tests (${{ matrix.backend }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [sentinel, araios]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install sentinel backend deps
        if: matrix.backend == 'sentinel'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/backend/sentinel/requirements.txt

      - name: Test sentinel backend
        if: matrix.backend == 'sentinel'
        env:
          JWT_SECRET_KEY: ci-test-secret-key-with-32-bytes-minimum
          DEV_TOKEN: sentinel-dev-token
        run: |
          cd apps/backend/sentinel
          python -m compileall app tests
          pytest tests/test_auth_flow.py tests/test_validation.py tests/test_memory.py -q

      - name: Install araios backend deps
        if: matrix.backend == 'araios'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/backend/araios/requirements.txt

      - name: Test araios backend
        if: matrix.backend == 'araios'
        run: |
          cd apps/backend/araios
          python -m compileall app tests main.py
          pytest tests -q

  frontend-build:
    name: Frontend Build (${{ matrix.frontend.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        frontend:
          - name: sentinel
            path: apps/frontend/sentinel
          - name: araios
            path: apps/frontend/araios
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.frontend.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.frontend.path }}
        run: npm ci

      - name: Build
        working-directory: ${{ matrix.frontend.path }}
        run: npm run build
